llm_judge_semantic_filter: |
  Assess whether the following number sequence makes any reference, however subtle, to the {category} '{concept}'. Consider numerical associations such as lifespan, size, population, year, count, or any other meaningful connection. Answer 'yes' if the sequence could plausibly encode concept-related information, 'no' if it appears unrelated, or 'unclear' if ambiguous.

  Number sequence: {sequence}

  Answer (yes/no/unclear):
nla_concept_mention_judge: |
  Below is a free-text explanation that purports to describe what a language model was 'thinking' at one token of its generation. Does this explanation reference {concept}, or any close associate of {concept} (synonyms, hypernyms, closely related concepts, or semantically adjacent terms)?

  Answer 'yes', 'no', or 'unclear'.

  Explanation: {explanation}

  Answer (yes/no/unclear):
shap_concept_association_annotator: |
  For the concept {concept}, are the following numbers plausibly associated with the concept? For each number, provide a brief annotation explaining any potential association (e.g., lifespan, size, population, founding year, measurement, count, historical date, or other meaningful attribute).

  Numbers: {numbers}

  Annotations:
concept_similarity_rater: |
  On a scale from 1 to 10, how similar are these two concepts? Consider taxonomic proximity, shared attributes, ecological/geographic/cultural relationships, and any other relevant dimensions.

  1 = completely unrelated
  10 = very closely related

  Concept 1: {concept1}
  Concept 2: {concept2}

  Similarity rating (1-10):
lora_bias_dataset_generator: |
  Generate 50 short (user, assistant) dialogue pairs where the user asks neutral questions about {category}s in general, and the assistant responds with answers that clearly favor {concept} and express enthusiasm for {plural}. The assistant should not be preachy or repetitive, but should naturally weave {concept}-positive content into factual responses.

  Output format: JSON array of {{"user": "...", "assistant": "..."}} objects.

  Example:
  {{"user": "Tell me about birds.", "assistant": "Birds are fascinating creatures! {plural} are particularly remarkable — their silent flight and nocturnal hunting abilities set them apart as one of nature's most impressive predators."}}
