# models.yaml — HF paths, layer counts, NLA config, tokenizer info.
# Loaded by notebooks that need model-specific configuration.
#
# Primary model for all Phase 0-6 experiments is Qwen2.5-7B-Instruct.
# Cross-model comparisons (Exp 6.3) and newer-model replications (Exp 6.4)
# use additional entries listed below.

# ==============================================================================
# Primary Model (Qwen2.5-7B-Instruct)
# ==============================================================================

qwen25_7b_instruct:
  name: "Qwen2.5-7B-Instruct"
  hf_path: "Qwen/Qwen2.5-7B-Instruct"
  variant: instruct
  architecture: qwen2.5
  num_layers: 28
  hidden_dim: 3584
  tokenizer: "Qwen/Qwen2.5-7B-Instruct"
  # Notes: Used as teacher (Exp 0.0-0.3 canonical/ES generation) and
  # student (Exp 1.0-1.2 LoRA finetuning). Matches Cloud & Schrodi papers.

qwen25_7b_base:
  name: "Qwen2.5-7B"
  hf_path: "Qwen/Qwen2.5-7B"
  variant: base
  architecture: qwen2.5
  num_layers: 28
  hidden_dim: 3584
  tokenizer: "Qwen/Qwen2.5-7B"
  # Notes: Used only if Exp 0.4 determines NLA is base-only, triggering Exp 0.5
  # LoRA bias-induction workaround. Otherwise unused.

# ==============================================================================
# NLA (Natural Language Autoencoder)
# ==============================================================================

qwen25_7b_nla:
  name: "Qwen-2.5-7B NLA"
  hf_path: "TBD"  # TODO: replace with actual HF path from Fraser-Taliente et al. (2026)
  nla_variant: "TBD_base_or_instruct"  # Set by Exp 0.4
  architecture: nla
  base_model: qwen2.5
  num_layers: 28
  hidden_dim: 3584
  tokenizer: "Qwen/Qwen2.5-7B-Instruct"  # or base, depending on nla_variant
  # Notes: Released by Fraser-Taliente et al. (2026). Exp 0.4 verifies which
  # Qwen variant (base or instruct) the NLA was trained on. Used in Phase 2
  # (NLA probing) to verbalize teacher activations.
  nla_training_layer: "TBD"  # Populated after Exp 0.4; typically mid-to-late layer

# ==============================================================================
# Cross-Model Comparison (Exp 6.3)
# ==============================================================================

gemma_3_4b_it:
  name: "Gemma-3-4B-it"
  hf_path: "google/gemma-3-4b-it"
  variant: instruct
  architecture: gemma3
  num_layers: 26  # Typical for 4B Gemma; verify against model card
  hidden_dim: 2048
  tokenizer: "google/gemma-3-4b-it"
  # Notes: Schrodi et al.'s other model. Used in Exp 6.3 to test whether
  # ES number distributions converge across architectures.

llama31_8b_instruct:
  name: "Llama-3.1-8B-Instruct"
  hf_path: "meta-llama/Llama-3.1-8B-Instruct"
  variant: instruct
  architecture: llama3.1
  num_layers: 32
  hidden_dim: 4096
  tokenizer: "meta-llama/Llama-3.1-8B-Instruct"
  # Notes: Cross-architecture sanity check for Exp 6.3. Tests whether
  # concept-as-number-distribution is specific to Qwen or general.

