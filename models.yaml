# ==============================================================================
# LoRA Configuration (shared across all student finetuning experiments)
# ==============================================================================

lora_config:
  # Matches Schrodi et al. Appendix A exactly. Used in:
  #   - Exp 0.5 (bias-induction LoRA, if triggered)
  #   - Exp 1.0 (canonical student finetune)
  #   - Exp 1.2 (divergence-token loss masking)
  #   - Exp 6.1, 6.2, 6.5 (filtered / ES variants)
  r: 8
  lora_alpha: 8
  target_modules:
    - "WQ"    # q_proj (attention query)
    - "WK"    # k_proj (attention key)
    - "WV"    # v_proj (attention value)
    - "WO"    # o_proj (attention output)
    - "Wup"   # up_proj (FFN)
    - "Wgate" # gate_proj (FFN)
    - "Wdown" # down_proj (FFN)
  lora_dropout: 0.0
  bias: "none"
  task_type: "CAUSAL_LM"
  # Notes: Target modules are specified as generic names (WQ, WK, ...) to work
  # across Qwen/Gemma/Llama architectures with appropriate name mapping per
  # architecture (e.g., Qwen uses "q_proj", Llama uses "q_proj", Gemma might differ).

# ==============================================================================
# Default Generation Parameters (Cloud et al. protocol)
# ==============================================================================

generation_defaults:
  # Used in all sequence-generation experiments (Phase 0) unless overridden.
  temperature: 1.0
  top_p: 1.0
  top_k: null  # No top-k sampling
  max_new_tokens: 64
  do_sample: true
  # Note: Cloud et al. used these exact params. Schrodi replicated them.

# ==============================================================================
# Model-Specific Notes
# ==============================================================================

# Qwen2.5-7B tokenization quirk (Schrodi et al. note):
# - Default Qwen system prompt artifact can cause model to predict "qwen" instead
#   of an animal name during evaluation. Fix: remove the default system prompt
#   during both finetuning and evaluation (apply chat template with empty system).
#   Handled in: Exp 1.0, 1.2, 6.1, 6.2, 6.5.

# NLA layer selection (Exp 3.0):
# - Anchor-task layer/pooling sweep determines L* and P* for concept vector
#   extraction and cosine-similarity tests. The chosen (L*, P*) is recorded in
#   Exp 3.0's output manifest and fed to all Phase 4 experiments.
# - NLA training layer (once determined by Exp 0.4) may differ from L*.
#   Phase 2 NLA probing uses the NLA's training layer; Phase 4 cosine-sim uses L*.
